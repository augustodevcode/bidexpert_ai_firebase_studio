# ==============================================================================
# GitHub Action: Deploy PROD para Vercel
# ==============================================================================
# Trigger: Push na branch main
# Requer aprovação manual via GitHub Environment "Production"
# Valida fluxo sequencial: HML -> DEMO -> PROD
# ==============================================================================

name: Deploy PROD to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrate:
        description: "Executar db push (schema sync)?"
        required: false
        default: false
        type: boolean
      run_seed:
        description: "Executar seed (popular dados)?"
        required: false
        default: false
        type: boolean

env:
  PRISMA_SCHEMA: prisma/deploy/schema.postgresql.prisma

jobs:
  build:
    name: 🔨 Production Build Validation
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma/deploy/schema.postgresql.prisma prisma/schema.prisma

      - name: 🔐 Validate DATABASE_URL Protocol (PostgreSQL)
        run: |
          DB_URL="${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}"
          if [ -z "$DB_URL" ]; then
            echo "❌ DATABASE_URL não configurada para produção"
            exit 1
          fi
          if [[ "$DB_URL" != postgresql://* && "$DB_URL" != postgres://* && "$DB_URL" != prisma://* && "$DB_URL" != prisma+postgres://* ]]; then
            echo "❌ DATABASE_URL inválida para schema PostgreSQL. Prefixos aceitos: postgresql://, postgres://, prisma://, prisma+postgres://"
            exit 1
          fi
          echo "✅ DATABASE_URL válida para PostgreSQL"

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔐 Validate Promotion Source (DEMO ➜ PROD)
        run: |
          git fetch origin demo-stable
          if ! git merge-base --is-ancestor origin/demo-stable HEAD; then
            echo "❌ Promoção inválida: HEAD de main não contém demo-stable"
            exit 1
          fi
          echo "✅ Promoção válida: demo-stable está contida em main"

      - name: 🔍 Type Check
        run: npm run typecheck

      - name: 🧹 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || secrets.PROD_NEXTAUTH_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || secrets.PROD_AUTH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

  migrate:
    name: 🗃️ Database Schema Push & Seed (Optional)
    runs-on: ubuntu-latest
    environment: Production
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[migrate]') ||
      contains(github.event.head_commit.message, '[seed]')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma/deploy/schema.postgresql.prisma prisma/schema.prisma

      - name: 🔐 Validate DATABASE_URL Protocol (PostgreSQL)
        run: |
          DB_URL="${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}"
          if [ -z "$DB_URL" ]; then
            echo "❌ DATABASE_URL não configurada para produção"
            exit 1
          fi
          if [[ "$DB_URL" != postgresql://* && "$DB_URL" != postgres://* && "$DB_URL" != prisma://* && "$DB_URL" != prisma+postgres://* ]]; then
            echo "❌ DATABASE_URL inválida para schema PostgreSQL. Prefixos aceitos: postgresql://, postgres://, prisma://, prisma+postgres://"
            exit 1
          fi
          echo "✅ DATABASE_URL válida para PostgreSQL"

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}

      - name: 🗃️ Push Schema to Database
        if: >
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrate == 'true') ||
          contains(github.event.head_commit.message, '[migrate]')
        run: npx prisma db push --accept-data-loss
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}

      - name: 🌱 Run Seed
        if: >
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_seed == 'true') ||
          contains(github.event.head_commit.message, '[seed]')
        run: npx tsx scripts/ultimate-master-seed.ts
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.PROD_POSTGRES_PRISMA_URL || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING || secrets.PROD_DATABASE_URL_DIRECT || secrets.SUPABASE_DATABASE_URL_DIRECT || secrets.DATABASE_URL || secrets.PROD_DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}

  alias:
    name: 🔗 Assign Stable PROD Alias
    runs-on: ubuntu-latest
    environment: Production
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔗 Assign stable alias
        run: node scripts/ci-cd/assign-vercel-branch-alias.mjs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_BRANCH_NAME: main
          VERCEL_TARGET: production
          VERCEL_COMMIT_SHA: ${{ github.sha }}
          VERCEL_ALIAS_DOMAIN: bidexpert-main.vercel.app
          VERCEL_ALIAS_MAX_ATTEMPTS: '40'
          VERCEL_ALIAS_POLL_MS: '15000'

  notify:
    name: 📢 PROD Status Report
    runs-on: ubuntu-latest
    environment: Production
    needs: [build, migrate, alias]
    if: always()

    steps:
      - name: 📢 Status Report
        run: |
          echo "============================================"
          echo "📋 DEPLOY PROD REPORT"
          echo "============================================"
          echo "🔨 Build: ${{ needs.build.result }}"
          echo "🗃️ Migrate/Seed: ${{ needs.migrate.result || 'skipped' }}"
          echo "🔗 Alias: ${{ needs.alias.result || 'skipped' }}"
          echo "============================================"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Build passou! Deploy automático pelo Vercel Git Integration."
            echo "🌐 Stable Alias: https://bidexpert-main.vercel.app"
          else
            echo "❌ Build falhou! Deploy bloqueado."
            exit 1
          fi
