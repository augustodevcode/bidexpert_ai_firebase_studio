# ==============================================================================
# GitHub Action: Deploy DEMO para Vercel
# ==============================================================================
# Trigger: Push na branch demo-stable
# Deploy: Vercel Git Integration (automático via push ao GitHub)
# Schema/Seed: Executados quando commit inclui [migrate] ou [seed]
# ==============================================================================

name: Deploy DEMO to Vercel

on:
  push:
    branches:
      - demo-stable
  workflow_dispatch:
    inputs:
      run_migrate:
        description: "Executar db push (schema sync)?"
        required: false
        default: true
        type: boolean
      run_seed:
        description: "Executar seed (popular dados)?"
        required: false
        default: false
        type: boolean

env:
  PRISMA_SCHEMA: prisma-deploy/schema.postgresql.prisma

jobs:
  # ============================================================================
  # JOB 1: Build Validation (verifica se o build passa)
  # ============================================================================
  build:
    name: 🔨 Build Validation
    runs-on: ubuntu-latest
    environment: Demo

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma-deploy/schema.postgresql.prisma prisma/schema.prisma

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔐 Check Promotion Source (HML ➜ DEMO)
        run: |
          if git fetch origin hml; then
            if git merge-base --is-ancestor origin/hml HEAD; then
              echo "✅ hml está contida em demo-stable (promoção via HML confirmada)."
            else
              echo "ℹ️  hml não é ancestral de demo-stable — feature foi promovida diretamente para demo-stable (fluxo direto permitido)."
            fi
          else
            echo "⚠️  Branch hml não encontrada remotamente — verificação de promoção ignorada."
          fi

      - name: 🔍 Type Check
        run: npm run typecheck:soft

      - name: 🏗️ Build
        run: npm run build
        env:
          # DEMO = Neon PostgreSQL.
          # Prefer environment-specific secrets and keep legacy fallbacks during migration.
          POSTGRES_PRISMA_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.DEMO_NEXTAUTH_SECRET || secrets.NEXTAUTH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-demo-secret-key-at-least-32-chars-long!' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.DEMO_APP_URL }}

  # ============================================================================
  # JOB 2: Database Schema Push + Seed (condicional)
  # Ativado por: [migrate] ou [seed] no commit message, ou workflow_dispatch
  # Deploy é feito automaticamente pelo Vercel Git Integration
  # ============================================================================
  migrate:
    name: 🗃️ Database Schema Push & Seed
    runs-on: ubuntu-latest
    environment: Demo
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[migrate]') ||
      contains(github.event.head_commit.message, '[seed]')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma-deploy/schema.postgresql.prisma prisma/schema.prisma

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_PRISMA_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}

      - name: 🗃️ Push Schema to Database
        if: >
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrate == 'true') ||
          contains(github.event.head_commit.message, '[migrate]')
        run: npx prisma db push --accept-data-loss
        env:
          # Schema operations (db push) REQUIRE a direct (non-pooled) connection.
          # POSTGRES_URL_NON_POOLING must be configured in GitHub secrets.
          # Fallback to DATABASE_URL warns: pooled URLs may fail for migrations.
          DATABASE_URL: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_PRISMA_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}

      - name: 🌱 Run Seed (Master Data)
        if: >
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_seed == 'true') ||
          contains(github.event.head_commit.message, '[seed]')
        run: npx tsx scripts/ultimate-master-seed.ts
        env:
          # Seed also benefits from a direct connection to avoid pgbouncer limits.
          DATABASE_URL: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_PRISMA_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}

      - name: ✅ Verify Data
        run: |
          echo "🔍 Verificando dados inseridos..."
          npx tsx -e "
            import { PrismaClient } from '@prisma/client';
            const p = new PrismaClient();
            Promise.all([
              p.user.count(),
              p.tenant.count(),
              p.auction.count(),
              p.lot.count()
            ]).then(([u, t, a, l]) => {
              console.log('============================================');
              console.log('📊 DATABASE STATUS:');
              console.log('============================================');
              console.log('👤 Users:', u);
              console.log('🏢 Tenants:', t);
              console.log('🔨 Auctions:', a);
              console.log('📦 Lots:', l);
              console.log('============================================');
              if (u === 0 && t === 0) {
                console.log('⚠️  Database vazia - considere executar com [seed]');
              } else {
                console.log('✅ Database com dados!');
              }
            }).catch(e => console.error('❌ Erro:', e.message))
            .finally(() => p.\$disconnect());
          "
        env:
          DATABASE_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_PRISMA_URL: ${{ secrets.DEMO_POSTGRES_PRISMA_URL || secrets.POSTGRES_PRISMA_URL || secrets.POSTGRES_URL || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEMO_POSTGRES_URL_NON_POOLING || secrets.POSTGRES_URL_NON_POOLING || secrets.DEMO_DATABASE_URL_DIRECT || secrets.DEMO_DATABASE_URL || secrets.DATABASE_URL }}

  alias:
    name: 🔗 Assign Stable DEMO Alias
    runs-on: ubuntu-latest
    environment: Demo
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔗 Assign stable alias
        run: node scripts/ci-cd/assign-vercel-branch-alias.mjs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_BRANCH_NAME: demo-stable
          VERCEL_TARGET: preview
          VERCEL_COMMIT_SHA: ${{ github.sha }}
          VERCEL_ALIAS_DOMAIN: bidexpert-demo-demo-stable.vercel.app
          VERCEL_ALIAS_MAX_ATTEMPTS: '40'
          VERCEL_ALIAS_POLL_MS: '15000'

  # ============================================================================
  # JOB 3: Status Report
  # ============================================================================
  notify:
    name: 📢 Status Report
    runs-on: ubuntu-latest
    environment: Demo
    needs: [build, migrate, alias]
    if: always()

    steps:
      - name: 📢 Status Report
        run: |
          echo "============================================"
          echo "📋 DEPLOY DEMO REPORT"
          echo "============================================"
          echo "🔨 Build: ${{ needs.build.result }}"
          echo "🗃️ Migrate/Seed: ${{ needs.migrate.result || 'skipped' }}"
          echo "🔗 Alias: ${{ needs.alias.result || 'skipped' }}"
          echo "============================================"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Build passou! Deploy automático pelo Vercel Git Integration."
            echo "🌐 URL: ${{ secrets.DEMO_APP_URL }}"
            echo "🌐 Stable Alias: https://bidexpert-demo-demo-stable.vercel.app"
          else
            echo "❌ Build falhou! Verifique os logs."
          fi
