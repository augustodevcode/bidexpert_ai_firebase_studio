# ==============================================================================
# GitHub Action: Branch Protection & CI Gates
# ==============================================================================
# Validação de código em todos os PRs
# Bloqueia merge em main sem CI verde
# ==============================================================================

name: CI - Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - demo-stable
  push:
    branches:
      - main
      - demo-stable

env:
  PRISMA_SCHEMA: prisma/schema.postgresql.prisma

jobs:
  # ============================================================================
  # JOB 1: Type Check & Lint
  # ============================================================================
  typecheck:
    name: 🔍 Type Check & Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci
        
      - name: � Copy PostgreSQL schema
        run: cp prisma/schema.postgresql.prisma prisma/schema.prisma

      - name: �🗄️ Generate Prisma Client
        run: npx prisma generate
        
      - name: 🔍 Type Check (strict)
        run: npm run typecheck
        
      - name: 🧹 Lint (soft on pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run lint:soft

      - name: 🧹 Lint (strict on push)
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run lint
        continue-on-error: true

  # ============================================================================
  # JOB 2: Build Test
  # ============================================================================
  build:
    name: 🏗️ Build Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma/schema.postgresql.prisma prisma/schema.prisma
        
      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate

      - name: 🏗️ Build
        run: npm run build
        env:
          # Dummy values for build (não acessa DB)
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "dummy-secret-for-build-only"
          AUTH_SECRET: "dummy-secret-for-build-only"
          SESSION_SECRET: "ci-session-secret-key-at-least-32-chars-long!"

  # ============================================================================
  # JOB 3: Unit Tests (Vitest)
  # ============================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma/schema.postgresql.prisma prisma/schema.prisma
        
      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: 🧪 Run Unit Tests
        run: xvfb-run -a npm run test:unit

  # ============================================================================
  # JOB 4: Schema Validation (MySQL + PostgreSQL)
  # ============================================================================
  schema-validation:
    name: 🗃️ Schema Validation
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci
        
      - name: 🔍 Validate MySQL Schema
        run: npx prisma validate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"
        
      - name: 🔍 Validate PostgreSQL Schema
        run: |
          if [ -f "prisma/schema.postgresql.prisma" ]; then
            npx prisma validate --schema=prisma/schema.postgresql.prisma
          else
            echo "⚠️ PostgreSQL schema not found, skipping"
          fi
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

  # ============================================================================
  # JOB 5: Security Audit
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci
          
      - name: 🔒 npm audit
        run: npm audit --audit-level=critical

  # ============================================================================
  # RESULTADO: Gate de Qualidade
  # ============================================================================
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [typecheck, build, schema-validation]
    if: always()
    
    steps:
      - name: ✅ Check All Jobs
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.schema-validation.result }}" != "success" ]; then
            echo "❌ Quality gate failed!"
            exit 1
          fi
          echo "✅ All quality checks passed!"
