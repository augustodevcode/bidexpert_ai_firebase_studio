# ==============================================================================
# GitHub Action: Playwright Evidence Gate para PRs → HML
# ==============================================================================
# REGRA: Todo PR para hml DEVE ter evidência visual dos testes Playwright.
# Este workflow:
#   1. Executa testes da Biblioteca de Mídia (ML-01 a ML-08) contra Vercel HML
#   2. Faz upload dos screenshots como artefato (evidência obrigatória)
#   3. Comenta no PR com link para o relatório
#   4. Bloqueia o PR se nenhum teste passar (falha com exit code != 0)
#
# O status check "playwright-evidence" deve estar configurado como required
# nas branch protection rules de `hml`.
# ==============================================================================

name: 🎭 Playwright Evidence Gate (HML)

on:
  pull_request:
    branches:
      - hml
    types: [opened, synchronize, reopened]

jobs:
  playwright-evidence:
    name: 🎭 Playwright Evidence — Biblioteca de Mídia
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: 🔄 Copy PostgreSQL schema
        run: cp prisma-deploy/schema.postgresql.prisma prisma/schema.prisma

      - name: 🗄️ Generate Prisma Client
        run: npm run prisma:generate

      - name: 🧪 Executar testes de Biblioteca de Mídia (HML)
        id: playwright_run
        run: |
          npx playwright test \
            --config=playwright.media-vercel.config.ts \
            --reporter=list,html,json \
            2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.HML_APP_URL }}
          CI: true
        continue-on-error: true  # Não falhar aqui; falhar no step de gate abaixo

      - name: 📊 Upload screenshots (evidência obrigatória para PR)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence-hml-pr${{ github.event.pull_request.number }}
          path: |
            test-results/media-mcp/
            playwright-report-media-vercel/
          retention-days: 30  # Retenção longa para evidência de compliance

      - name: 📋 Upload relatório HTML completo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-hml-pr${{ github.event.pull_request.number }}
          path: playwright-report-media-vercel/
          retention-days: 30

      - name: 💬 Comentar no PR com resultado dos testes
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const exitCode = '${{ steps.playwright_run.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ PASSOU' : '❌ FALHOU';
            const emoji = exitCode === '0' ? '🟢' : '🔴';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            const body = `## ${emoji} Playwright Evidence Gate — Biblioteca de Mídia

            | Teste | Status |
            |-------|--------|
            | ML-01 Galeria renderiza | ${status} |
            | ML-02 Upload aparece na galeria | ${status} |
            | ML-03 Busca/filtro | ${status} |
            | ML-04 Sidebar metadados | ${status} |
            | ML-05 Lightbox preview | ${status} |
            | ML-06 Editor de imagem | ${status} |
            | ML-07 Delete remove da galeria | ${status} |
            | ML-08 URL da imagem acessível | ${status} |

            **📸 Evidências visuais (screenshots):** [Ver artefatos](${artifactUrl})
            **📊 Relatório completo:** [Ver run](${runUrl})

            > ⚠️ Este PR ${exitCode === '0' ? 'passou' : 'NÃO PASSOU'} na gate de evidências Playwright obrigatória para merge em \`hml\`.
            > Conforme regra: _Todo PR para hml DEVE ter evidências visuais dos testes Playwright._
            `;

            // Verificar se já existe comentário do bot neste PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Playwright Evidence Gate')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: 🚦 Gate Final — Falhar se testes não passaram
        if: steps.playwright_run.outputs.exit_code != '0'
        run: |
          echo "❌ Playwright Evidence Gate FALHOU!"
          echo ""
          echo "Este PR não pode ser mergeado em 'hml' sem evidências visuais dos testes Playwright."
          echo ""
          echo "REGRA: Todos os testes ML-01 a ML-08 da Biblioteca de Mídia devem passar."
          echo ""
          echo "Para corrigir:"
          echo "  1. Execute: npx playwright test --config=playwright.media-vercel.config.ts"
          echo "  2. Verifique os screenshots em test-results/media-mcp/"
          echo "  3. Corrija os erros e faça push"
          echo ""
          cat test-output.txt || true
          exit 1
